---
layout: default
---
<main class="container py-5 mt-4" style="max-width: 800px;">
    <article>
        <header class="mb-5 border-bottom pb-4 text-center">
            <h1 class="display-5 fw-bold text-primary">{{ page.title }}</h1>
            <p class="text-muted mt-3">Publicado em {{ page.date | date: "%d/%m/%Y" }}</p>
        </header>
        
        <section class="fs-5 lh-lg post-content">
            {{ content }}
        </section>
        
        <div class="mt-5 pt-4 border-top">
            <a href="{{ '/blog.html' | relative_url }}" class="btn btn-link text-decoration-none px-0">← Voltar para o Blog</a>
        </div>
    </article>
</main>
